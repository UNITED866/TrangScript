    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* === CẤU HÌNH GIAO DIỆN CHÍNH === */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body {
            /* Link ảnh nền bạn cung cấp */
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhH0C4KB4DZbVygBnoX2lli74wVo6Lqk84Gs0TYnlOVrzpqjHfk1B2PU10Ik5BWB3Rxb8RTl2t1e26q8lFxqrI9qQtkS6tO1aYYShQjikEy77Ul64Xv7cIeAn7yb8v9y5NLuPmqc12hD3WhDvXN_YZxjfeQbNLiL1UydncRgJ3HV_hL4KYmS6vFc47qCE8/s1366/1000029424.jpg') no-repeat center center/cover;
            background-attachment: fixed;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); z-index: -1; }

        /* === HIỆU ỨNG HẠT HỒNG === */
        #particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .particle { position: absolute; background: rgba(255, 182, 193, 0.6); border-radius: 50%; animation: fall linear infinite; }
        @keyframes fall {
            0% { transform: translateY(-10px) scale(0); opacity: 0; }
            100% { transform: translateY(100vh) scale(1); opacity: 0; }
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; position: relative; z-index: 1; }

        /* === THANH CHỌN GAME (TABS) === */
        .category-filter {
            display: flex;>
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .tab-btn {
            padding: 10px 25px;
            border-radius: 30px;
            border: 1px solid rgba(255, 182, 193, 0.3);
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            cursor: pointer;
            transition: 0.3s;
            backdrop-filter: blur(10px);
            font-weight: 500;
        }
        .tab-btn.active, .tab-btn:hover {
            background: #ffb6c1;
            color: #000;
            box-shadow: 0 0 15px #ffb6c1;
            border-color: #ffb6c1;
        }

        /* === SEARCH BOX === */
        .search-container { position: relative; max-width: 500px; margin: 0 auto 40px; }
        .search-box {
            width: 100%; padding: 15px 50px; border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.5);
            color: #fff; outline: none; backdrop-filter: blur(10px);
        }
        .search-container i { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: #ffb6c1; }

        /* === SCRIPT GRID === */
        .script-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
        .card {
            background: rgba(255, 255, 255, 0.08); border-radius: 20px; padding: 25px;
            border: 1px solid rgba(255,255,255,0.1); transition: 0.4s; backdrop-filter: blur(10px);
        }
        .card.hidden { display: none; }
        .card:hover { transform: translateY(-10px); border-color: #ffb6c1; box-shadow: 0 0 20px rgba(255, 182, 193, 0.3); }
        .card-header i { font-size: 1.5rem; color: #ffb6c1; margin-bottom: 10px; display: block; }
        
        .btn-get {
            width: 100%; padding: 12px; margin-top: 20px; border-radius: 12px;
            background: linear-gradient(45deg, #ffb6c1, #ff8da1);
            border: none; color: #000; font-weight: bold; cursor: pointer;
        }

        /* === MUSIC PLAYER === */
        .music-player {
            position: fixed; bottom: 20px; right: 20px; background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px); padding: 10px 20px; border-radius: 50px;
            display: flex; align-items: center; gap: 12px; border: 1px solid rgba(255, 255, 255, 0.2); z-index: 1001;
        }
        .music-img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid #ffb6c1; animation: rotateDisk 5s linear infinite; animation-play-state: paused; }
        @keyframes rotateDisk { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .play-btn { background: #ffb6c1; color: #000; width: 30px; height: 30px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; }

        /* === MODAL === */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; display: flex; justify-content: center; align-items: center; }
        .hidden { display: none !important; }
    </style>
</head>

    <script>
// --- 6. XỬ LÝ XÁC NHẬN TRUY CẬP & TỰ ĐỘNG BẬT NHẠC ---
function acceptAccess() {
    const accessModal = document.getElementById('accessModal');
    
    // Ẩn màn hình xác nhận
    accessModal.style.display = 'none';

    // Tự động bật nhạc ngay khi nhấn nút
    if (!isPlaying) {
        toggleMusic();
    }
}

// Tự động bật nhạc khi load trang
window.addEventListener('load', () => {
    const bgm = document.getElementById('bgm');
    const playIcon = document.getElementById('playIcon');
    const disk = document.getElementById('disk');

    // Cố gắng chạy nhạc
    bgm.play().then(() => {
        // Nếu trình duyệt cho phép chạy ngay
        isPlaying = true;
        playIcon.className = 'fa-solid fa-pause';
        disk.style.animationPlayState = 'running';
    }).catch(error => {
        // Nếu trình duyệt chặn, chờ người dùng click bất kỳ đâu để bật
        console.log("Autoplay bị chặn, đang chờ tương tác người dùng...");
        document.addEventListener('click', () => {
            if (!isPlaying) {
                toggleMusic();
            }
        }, { once: true }); // Chỉ chạy 1 lần duy nhất khi click
    });
});

        // --- 1. CHỨC NĂNG LỌC THEO MỤC GAME ---
        function filterGame(category) {
            // Đổi trạng thái nút Active
            const buttons = document.querySelectorAll('.tab-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');

            // Lọc các Card
            const cards = document.querySelectorAll('.card');
            cards.forEach(card => {
                const game = card.getAttribute('data-game');
                if (category === 'all' || game === category) {
                    card.classList.remove('hidden');
                } else {
                    card.classList.add('hidden');
                }
            });
        }

        // --- 2. TÌM KIẾM ---
        const searchInput = document.getElementById('searchInput');
        searchInput.addEventListener('input', () => {
            const filter = searchInput.value.toLowerCase();
            const activeCategory = document.querySelector('.tab-btn.active').innerText.toLowerCase();
            
            document.querySelectorAll('.card').forEach(card => {
                const name = card.getAttribute('data-name').toLowerCase();
                const game = card.getAttribute('data-game');
                
                // Vừa khớp tên tìm kiếm, vừa khớp danh mục đang chọn
                const matchesSearch = name.includes(filter);
                const matchesTab = (activeCategory === 'tất cả' || card.classList.contains('hidden') === false);
                
                if (matchesSearch) card.style.display = "flex";
                else card.style.display = "none";
            });
        });

        // --- 3. NHẠC & HẠT RƠI (GIỮ NGUYÊN TỪ BẢN TRƯỚC) ---
        const bgm = document.getElementById('bgm');
        const playIcon = document.getElementById('playIcon');
        const disk = document.getElementById('disk');
        let isPlaying = false;
        bgm.volume = 0.3;

        function toggleMusic() {
            if (isPlaying) { bgm.pause(); playIcon.className = 'fa-solid fa-play'; disk.style.animationPlayState = 'paused'; }
            else { bgm.play(); playIcon.className = 'fa-solid fa-pause'; disk.style.animationPlayState = 'running'; }
            isPlaying = !isPlaying;
        }

        function startRedirect(url, sec) {
            document.getElementById('redirectModal').classList.remove('hidden');
            let time = sec;
            const countEl = document.getElementById('countdown');
            countEl.innerText = time;
            let inter = setInterval(() => {
                time--;
                countEl.innerText = time;
                if(time <= 0) {
                    clearInterval(inter);
                    window.open(url, '_blank');
                    document.getElementById('redirectModal').classList.add('hidden');
                }
            }, 1000);
        }

        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 40; i++) {
                let p = document.createElement('div');
                p.classList.add('particle');
                p.style.cssText = `width:${Math.random()*6+2}px; height:${Math.random()*6+2}px; left:${Math.random()*100}vw; animation: fall ${Math.random()*8+4}s linear infinite; animation-delay:${Math.random()*5}s;`;
                container.appendChild(p);
            }
        }
        window.onload = createParticles;
    </script>
